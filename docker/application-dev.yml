# ============================================
# HR 管理系统 — 开发环境配置
# 配合 docker-compose.yml 使用
# ============================================

server:
  port: 8080
  address: 0.0.0.0
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8
    accesslog:
      enabled: true
      directory: logs
      pattern: '%{yyyy-MM-dd HH:mm:ss.SSS}t %h "%r" %s %b %Dms "%{Referer}i" "%{User-Agent}i"'
      prefix: access
      suffix: .log
      rotate: true
      rename-on-rotate: true
      max-days: 30

# ============================================
# CORS 跨域配置 — 前端不在本机时需要修改为前端设备的 IP
# 多个来源用逗号分隔，如 http://192.168.1.100:3000,http://192.168.1.101:3000
# ============================================
cors:
  allowed-origins: "*"

spring:
  application:
    name: hr-backend

  # ------------------------------------------
  # 数据源 — MySQL 8.0
  # ------------------------------------------
  datasource:
    url: jdbc:mysql://localhost:3306/hr_db?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  # ------------------------------------------
  # Redis 6 — Token 缓存
  # ------------------------------------------
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
      timeout: 3000ms

  # ------------------------------------------
  # 文件上传限制 — 对齐 json设计.md 12.4
  # ------------------------------------------
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ------------------------------------------
  # Jackson 日期格式 — 对齐 json设计.md 12.2
  # ------------------------------------------
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# ============================================
# MyBatis-Plus 配置
# ============================================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # 开发环境打印 SQL
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ============================================
# JWT 配置 — 对齐 json设计.md 2.1
# ============================================
jwt:
  secret: hr-jwt-secret-key-for-dev-environment-only
  expiration: 86400000    # 24小时，对应接口返回的 expiresIn

# ============================================
# MinIO 文件存储 — 对齐 json设计.md 5.1/9.1
# ============================================
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket: hr-files

# ============================================
# Knife4j 接口文档（Swagger）
# ============================================
springdoc:
  swagger-ui:
    path: /doc.html
    enabled: true
  api-docs:
    path: /v3/api-docs

# ============================================
# 日志
# ============================================
logging:
  level:
    com.hr: debug
    org.springframework.security: debug
