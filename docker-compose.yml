# HR 管理系统 — 后端中间件 Docker 环境
# 使用: docker-compose up -d

services:
  # ============================================
  # MySQL 8.0 — 业务数据库
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: hr-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: hr_db
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d   # 初始化 SQL 脚本
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    networks:
      - hr-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis 6-alpine — Token 缓存 / 会话
  # ============================================
  redis:
    image: redis:6-alpine
    container_name: hr-redis
    restart: always
    command: redis-server --requirepass redis123 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hr-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MinIO — 文件存储（简历/导入导出/头像）
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: hr-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"   # API 端口
      - "9001:9001"   # Web 控制台
    volumes:
      - minio_data:/data
    networks:
      - hr-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================
# 数据卷
# ============================================
volumes:
  mysql_data:
  redis_data:
  minio_data:

# ============================================
# 网络
# ============================================
networks:
  hr-net:
    driver: bridge
