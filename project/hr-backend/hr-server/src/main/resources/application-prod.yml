# 生产环境配置（Docker 部署时使用服务名）
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/hr_system?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379

minio:
  endpoint: http://minio:9000
  access-key: ${MINIO_USER:admin}
  secret-key: ${MINIO_PASSWORD:admin123456}

logging:
  level:
    com.hr: info
