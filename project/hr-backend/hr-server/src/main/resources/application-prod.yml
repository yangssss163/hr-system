server:
  port: 8080
  address: 0.0.0.0
  error:
    whitelabel:
      enabled: false
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8
    accesslog:
      enabled: true
      directory: /app/logs
      prefix: access
      suffix: .log
      pattern: '%{yyyy-MM-dd HH:mm:ss.SSS}t %h "%r" %s %b %Dms'
      file-date-format: .yyyy-MM-dd
      rotate: true
      rename-on-rotate: false
      max-days: 30

cors:
  allowed-origins: "*"

spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/hr_system?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123
  data:
    redis:
      host: redis
      port: 6379
      password: redis123
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: your-jwt-secret-key-change-in-production
  expiration: 86400000

minio:
  endpoint: http://minio:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket: hr-files

app:
  serve-spa: true

knife4j:
  enable: true
  setting:
    language: zh_cn
